<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NannyMeals — Catálogo de Receitas</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="src/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="manifest" href="manifest.json" />
  <style>
    body { min-height: 100dvh; }

    .recipe-card {
      background: white;
      border-radius: 20px;
      border: 1.5px solid #e4ede7;
      overflow: hidden;
      cursor: pointer;
      transition: all 180ms ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    html.dark .recipe-card { background: #111a14; border-color: #1e2d22; }
    .recipe-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(19,236,91,0.15), 0 2px 8px rgba(0,0,0,0.08); border-color: #13ec5b; }
    .recipe-card:active { transform: scale(0.98); }

    .recipe-card-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
    }
    .recipe-card-img-placeholder {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 14px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 180ms ease;
    }
    .filter-chip-inactive {
      background: white;
      border-color: #e4ede7;
      color: #6b7e72;
    }
    html.dark .filter-chip-inactive { background: #111a14; border-color: #1e2d22; color: #9ca8a0; }
    .filter-chip-inactive:hover { border-color: #13ec5b; color: #13ec5b; }
    .filter-chip-active {
      background: #13ec5b;
      color: #0a1a0e;
      box-shadow: 0 4px 12px rgba(19,236,91,0.35);
    }

    .tag-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Category image mapping */
    .cat-sopa { background: linear-gradient(135deg, #fdf4e7, #fde8c8); }
    .cat-carne { background: linear-gradient(135deg, #fdf0f0, #fdd8d8); }
    .cat-peixe { background: linear-gradient(135deg, #e8f4fd, #c8e2fd); }
    .cat-massa { background: linear-gradient(135deg, #fdf8e8, #fdf0c8); }
    .cat-vegetariano { background: linear-gradient(135deg, #edfdf0, #c8fdd4); }
    .cat-sobremesa { background: linear-gradient(135deg, #fdf0fd, #f6c8fd); }
    .cat-default { background: linear-gradient(135deg, #f0f8f4, #e2f0e8); }

    .search-input {
      width: 100%;
      background: white;
      border: 1.5px solid #e4ede7;
      border-radius: 14px;
      padding: 0 16px 0 44px;
      height: 46px;
      font-size: 14px;
      font-weight: 600;
      color: #1a2e1f;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }
    html.dark .search-input { background: #111a14; border-color: #1e2d22; color: #e8f5ec; }
    .search-input:focus { border-color: #13ec5b; box-shadow: 0 0 0 3px rgba(19,236,91,0.15); outline: none; }
    .search-input::placeholder { color: #9ca8a0; font-weight: 500; }
  </style>
  <script>
    (function() {
      const saved = localStorage.getItem('nm_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
    })();
    if (localStorage.getItem('app_version') !== 'v31') {
      localStorage.setItem('app_version', 'v31');
      if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      if ('caches' in window) caches.keys().then(names => { names.forEach(n => caches.delete(n)); setTimeout(() => window.location.reload(true), 500); });
    }
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
  <div class="app-container">

    <!-- ── Header ───────────────────────────────── -->
    <header class="sticky top-0 z-20 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-slate-100 dark:border-border-dark px-4 lg:px-6 pt-5 pb-4">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-xl font-black tracking-tight">Catálogo de Receitas</h1>
        <div class="flex gap-2">
          <a href="add-recipe.html"
            class="size-10 rounded-full bg-primary text-slate-900 hover:bg-primary-dark flex items-center justify-center shadow-glow transition-all"
            title="Nova Receita">
            <span class="material-symbols-outlined text-xl font-bold">add</span>
          </a>
          <button id="btn-logout" class="size-10 rounded-full hover:bg-primary/10 text-slate-400 hover:text-primary flex items-center justify-center transition-colors">
            <span class="material-symbols-outlined text-xl">logout</span>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="relative mb-3">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl pointer-events-none">search</span>
        <input id="search-input" type="text" placeholder="Procurar receita..." class="search-input" />
      </div>

      <!-- Filters -->
      <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1 -mx-4 px-4">
        <button class="filter-btn filter-chip filter-chip-active shrink-0" data-filter="all">Todas</button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0 flex items-center gap-1.5" data-filter="pantry">
          <span class="material-symbols-outlined text-sm">inventory_2</span>
          Minha Despensa
        </button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0" data-filter="fast">⚡ Rápidas</button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0" data-filter="vegetarian">🥦 Veg.</button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0" data-filter="kid-friendly">👶 Crianças</button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0" data-filter="sopa">🥣 Sopas</button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0" data-filter="sobremesa">🍮 Sobremesas</button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0" data-filter="carne">🥩 Carne</button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0" data-filter="peixe">🐟 Peixe</button>
        <button class="filter-btn filter-chip filter-chip-inactive shrink-0" data-filter="massa">🍝 Massa</button>
      </div>
    </header>

    <!-- ── Main ──────────────────────────────────── -->
    <main class="flex-1 overflow-y-auto pb-safe">
      <div class="p-4 lg:p-6">
        <!-- Loading skeleton -->
        <div id="loading-state" class="grid grid-cols-2 lg:grid-cols-3 gap-3">
          
            <div class="rounded-2xl overflow-hidden border border-slate-100 dark:border-border-dark">
              <div class="skeleton h-[120px] w-full"></div>
              <div class="p-3 space-y-2">
                <div class="skeleton h-4 w-3/4 rounded"></div>
                <div class="skeleton h-3 w-1/2 rounded"></div>
              </div>
            </div>
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-muted gap-4">
          <div class="size-20 rounded-3xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
            <span class="material-symbols-outlined text-4xl">search_off</span>
          </div>
          <div class="text-center">
            <p class="font-bold text-slate-700 dark:text-slate-200">Nenhuma receita encontrada</p>
            <p class="text-sm mt-1">Tenta mudar os filtros ou a pesquisa</p>
          </div>
        </div>

        <!-- Recipes grid -->
        <div id="recipes-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3 hidden"></div>
      </div>
    </main>
  </div>

  <!-- ── Recipe Detail Modal ───────────────────── -->
  <div id="recipe-modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end lg:items-center justify-center p-0 lg:p-6">
    <div class="w-full lg:max-w-xl h-[90dvh] lg:h-auto lg:max-h-[85dvh] bg-white dark:bg-surface-dark rounded-t-3xl lg:rounded-3xl flex flex-col overflow-hidden shadow-2xl border border-slate-200 dark:border-border-dark animate-scale-in">
      <!-- Modal Header -->
      <div class="shrink-0 bg-gradient-to-r from-primary/15 to-primary/5 dark:from-primary/10 dark:to-transparent p-5 border-b border-slate-100 dark:border-border-dark">
        <div id="modal-image-container" class="mb-4 hidden">
          <img id="modal-recipe-image" alt="Recipe" class="w-full h-44 object-cover rounded-2xl shadow-md" />
        </div>
        <div class="flex items-start gap-3">
          <div class="flex-1 min-w-0">
            <h2 id="modal-recipe-name" class="text-xl font-black tracking-tight leading-tight"></h2>
            <div id="modal-tags-container" class="flex flex-wrap gap-1.5 mt-2"></div>
          </div>
          <button onclick="closeRecipeModal()" class="shrink-0 size-10 rounded-full bg-white dark:bg-slate-800 shadow-md hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center justify-center transition-all">
            <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">close</span>
          </button>
        </div>
        <div class="flex flex-wrap gap-2 mt-3">
          <div class="flex items-center gap-1.5 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-full shadow-sm">
            <span class="material-symbols-outlined text-primary text-base" style="font-variation-settings:'FILL' 1">schedule</span>
            <span class="text-sm font-bold text-slate-700 dark:text-slate-200" id="modal-prep-time">--</span>
          </div>
          <div id="modal-price-container" class="hidden flex items-center gap-1.5 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-full shadow-sm">
            <span class="material-symbols-outlined text-green-600 text-base" style="font-variation-settings:'FILL' 1">euro</span>
            <span class="text-sm font-bold text-green-600" id="modal-price">--</span>
          </div>
          <div id="modal-calories-container" class="hidden flex items-center gap-1.5 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-full shadow-sm">
            <span class="material-symbols-outlined text-orange-500 text-base" style="font-variation-settings:'FILL' 1">local_fire_department</span>
            <span class="text-sm font-bold text-orange-500" id="modal-calories">--</span>
          </div>
        </div>
      </div>

      <!-- Scrollable Content -->
      <div class="flex-1 overflow-y-auto p-5 space-y-4 pb-12">
        <!-- Ingredients -->
        <div class="bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-4">
          <h3 class="font-black text-xs uppercase tracking-widest text-primary mb-3 flex items-center gap-2">
            <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">shopping_basket</span>
            Ingredientes
          </h3>
          <ul id="modal-ingredients" class="space-y-1.5"></ul>
        </div>
        <!-- Instructions -->
        <div id="instructions-section" class="bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-4 hidden">
          <h3 class="font-black text-xs uppercase tracking-widest text-primary mb-3 flex items-center gap-2">
            <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">menu_book</span>
            Modo de Preparação
          </h3>
          <ol id="modal-instructions" class="space-y-2 text-sm leading-relaxed text-slate-600 dark:text-slate-300"></ol>
        </div>
        <!-- Nutrition -->
        <div id="nutrition-section" class="hidden">
          <h3 class="font-black text-xs uppercase tracking-widest text-muted mb-3">Informação Nutricional</h3>
          <div id="modal-nutrition" class="grid grid-cols-4 gap-2"></div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="shrink-0 bg-white dark:bg-surface-dark border-t border-slate-100 dark:border-border-dark p-4 pb-[calc(1rem+env(safe-area-inset-bottom))] space-y-2">
        <div class="grid grid-cols-2 gap-2">
          <button onclick="addRecipeToNewPlan()" class="flex items-center justify-center gap-2 bg-primary text-slate-900 py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-glow hover:bg-primary-dark transition-all active:scale-[0.97]">
            <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">add_circle</span>
            Ao Plano
          </button>
          <button onclick="goToGroceryList()" class="flex items-center justify-center gap-2 bg-green-500 text-white py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-green-500/30 hover:bg-green-600 transition-all active:scale-[0.97]">
            <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">shopping_cart</span>
            Comprar
          </button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="saveCurrentRecipe()" class="flex items-center justify-center gap-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
            <span class="material-symbols-outlined text-base">bookmark</span>
            Guardar
          </button>
          <button onclick="closeRecipeModal()" class="bg-transparent border-2 border-slate-200 dark:border-slate-700 text-muted py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest hover:border-slate-300 hover:text-slate-600 transition-all">
            Fechar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
    import { auth } from "./src/firebase-init.js";
    import { getAllRecipes, saveUserRecipe, getPantry, normalizeIngredientName } from "./src/db.js";
    import { logout } from "./src/auth.js";

    const loadingState = document.getElementById("loading-state");
    const emptyState = document.getElementById("empty-state");
    const recipesGrid = document.getElementById("recipes-grid");
    const searchInput = document.getElementById("search-input");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const recipeModal = document.getElementById("recipe-modal");

    let allRecipes = [], currentFilter = "all", currentSearchTerm = "", selectedRecipe = null, pantryData = { items: {} };

    // Category image mapping
    const categoryImages = {
      sopa: 'assets/images/recipe_sopa.png',
      carne: 'assets/images/recipe_carne.png',
      peixe: 'assets/images/recipe_peixe.png',
      massa: 'assets/images/recipe_massa.png',
      vegetarian: 'assets/images/recipe_vegetariano.png',
      vegetariano: 'assets/images/recipe_vegetariano.png',
      sobremesa: 'assets/images/recipe_sobremesa.png',
      default: 'assets/images/recipe_default.png'
    };
    const categoryEmoji = { sopa:'🥣', carne:'🥩', peixe:'🐟', massa:'🍝', vegetarian:'🥦', vegetariano:'🥦', sobremesa:'🍮', 'kid-friendly':'👶', fast:'⚡' };
    const categoryBg = { sopa:'cat-sopa', carne:'cat-carne', peixe:'cat-peixe', massa:'cat-massa', vegetarian:'cat-vegetariano', vegetariano:'cat-vegetariano', sobremesa:'cat-sobremesa' };

    function getRecipeImage(recipe) {
      if (recipe.image) return { type: 'img', src: recipe.image };
      const tags = recipe.tags || [];
      for (const tag of tags) {
        if (categoryImages[tag]) return { type: 'img', src: categoryImages[tag] };
      }
      return { type: 'placeholder', tags };
    }

    function getTagStyle(tag) {
      const styles = {
        sopa: 'bg-orange-100 text-orange-700', carne: 'bg-red-100 text-red-700',
        peixe: 'bg-blue-100 text-blue-700', massa: 'bg-yellow-100 text-yellow-700',
        vegetarian: 'bg-green-100 text-green-700', vegetariano: 'bg-green-100 text-green-700',
        sobremesa: 'bg-purple-100 text-purple-700', 'kid-friendly': 'bg-pink-100 text-pink-700',
        fast: 'bg-primary/15 text-primary',
      };
      return styles[tag] || 'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-300';
    }

    document.getElementById("btn-logout").onclick = () => logout();

    filterButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        filterButtons.forEach(b => {
          b.classList.remove("filter-chip-active");
          b.classList.add("filter-chip-inactive");
        });
        btn.classList.add("filter-chip-active");
        btn.classList.remove("filter-chip-inactive");
        currentFilter = btn.dataset.filter;
        renderRecipes();
      });
    });

    searchInput.addEventListener("input", e => { currentSearchTerm = e.target.value.toLowerCase(); renderRecipes(); });

    const filterRecipes = () => {
      let filtered = allRecipes;
      
      if (currentFilter === "pantry") {
        // Compute matches for all and filter/sort
        filtered = filtered.map(r => ({ ...r, _match: calcMatch(r) }));
        filtered = filtered.sort((a,b) => (b._match || 0) - (a._match || 0));
      } else if (currentFilter !== "all") {
        filtered = filtered.filter(r => r.tags && r.tags.includes(currentFilter));
      }

      if (currentSearchTerm) {
        filtered = filtered.filter(r => 
          r.name.toLowerCase().includes(currentSearchTerm) || 
          (r.tags && r.tags.some(t => t.toLowerCase().includes(currentSearchTerm))) ||
          (r.ingredients && r.ingredients.some(i => (typeof i === 'string' ? i : i.name||'').toLowerCase().includes(currentSearchTerm)))
        );
      }
      return filtered;
    };

    const calcMatch = (recipe) => {
      const items = pantryData.items || {};
      const pantryKeys = Object.keys(items).map(k => normalizeIngredientName(k));
      const recipeIngs = (recipe.ingredients || []).map(i => normalizeIngredientName(typeof i === 'string' ? i : i.name));
      
      if (recipeIngs.length === 0) return null;
      
      let matches = 0;
      recipeIngs.forEach(ing => {
        // Find if any pantry key matches
        if (pantryKeys.some(pk => ing.includes(pk) || pk.includes(ing)) && 
            items[Object.keys(items).find(k => normalizeIngredientName(k).includes(ing) || ing.includes(normalizeIngredientName(k)))] !== 'out') {
          matches++;
        }
      });
      
      return Math.round((matches / recipeIngs.length) * 100);
    };

    const renderRecipes = () => {
      const filtered = filterRecipes();
      loadingState.classList.add("hidden");
      if (filtered.length === 0) {
        emptyState.classList.remove("hidden");
        recipesGrid.classList.add("hidden");
        recipesGrid.innerHTML = "";
        return;
      }
      emptyState.classList.add("hidden");
      recipesGrid.classList.remove("hidden");
      recipesGrid.innerHTML = filtered.map(recipe => {
        const primaryTag = (recipe.tags || [])[0] || 'default';
        const emoji = categoryEmoji[primaryTag] || '🍽️';
        const imgHtml = recipe.image 
          ? `<img src="${recipe.image}" alt="${recipe.name}" class="recipe-card-img" loading="lazy" onerror="this.outerHTML='<div class=\'recipe-card-img-placeholder ${categoryBg[primaryTag] || 'cat-default'}\'>${emoji}</div>'">`
          : `<div class="recipe-card-img-placeholder ${categoryBg[primaryTag] || 'cat-default'}">${emoji}</div>`;
        
        // Use pre-computed match if available (from pantry filter) or calculate fresh
        const matchPct = recipe._match !== undefined ? recipe._match : calcMatch(recipe);
        const matchBar = matchPct !== null 
          ? `<div class="mt-2">
              <div class="flex items-center justify-between text-[8px] font-black uppercase tracking-widest text-muted mb-1">
                <span>Match em casa</span>
                <span class="${matchPct >= 80 ? 'text-primary' : matchPct >= 50 ? 'text-amber-500' : 'text-slate-400'}">${matchPct}%</span>
              </div>
              <div class="h-1 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full ${matchPct >= 80 ? 'bg-primary' : matchPct >= 50 ? 'bg-amber-500' : 'bg-slate-400'}" style="width: ${matchPct}%"></div>
              </div>
            </div>` 
          : '';

        const time = `<div class="flex items-center gap-1"><span class="material-symbols-outlined text-[10px] text-muted">schedule</span><span class="text-[10px] font-black text-muted">${recipe.prepTime || '--'} min</span></div>`;
        const tagsHtml = (recipe.tags || []).slice(0, 2).map(tag => `<span class="tag-badge ${getTagStyle(tag)}">${tag}</span>`).join('');

        return `<div class="recipe-card" onclick="openRecipeDetail('${recipe.id}')">
          ${imgHtml}
          <div class="p-3 space-y-2">
            <h3 class="font-black text-sm leading-tight line-clamp-2">${recipe.name}</h3>
            <div class="flex items-center justify-between">
              ${time}
              <div class="flex flex-wrap gap-1 justify-end">${tagsHtml}</div>
            </div>
            ${matchBar}
          </div>
        </div>`;
      }).join('');
    };

    window.openRecipeDetail = (recipeId) => {
      selectedRecipe = allRecipes.find(r => r.id === recipeId);
      if (!selectedRecipe) return;
      document.getElementById("modal-recipe-name").textContent = selectedRecipe.name;
      document.getElementById("modal-tags-container").innerHTML = (selectedRecipe.tags||[]).map(tag => `<span class="tag-badge ${getTagStyle(tag)}">${tag}</span>`).join('');
      document.getElementById("modal-prep-time").textContent = `${selectedRecipe.prepTime||'--'} min`;
      const pc = document.getElementById("modal-price-container"); const pe = document.getElementById("modal-price");
      if (selectedRecipe.pricePerServing) { pc.classList.remove("hidden"); pe.textContent = `${selectedRecipe.pricePerServing}€/porção`; } else { pc.classList.add("hidden"); }
      const cc = document.getElementById("modal-calories-container"); const ce = document.getElementById("modal-calories");
      const cal = selectedRecipe.calories || selectedRecipe.nutrition?.calories?.amount;
      if (cal) { cc.classList.remove("hidden"); ce.textContent = `${cal} kcal`; } else { cc.classList.add("hidden"); }
      // Image
      const imgC = document.getElementById("modal-image-container"); const imgEl = document.getElementById("modal-recipe-image");
      const imgData = getRecipeImage(selectedRecipe);
      if (imgData.type === 'img') { imgC.classList.remove("hidden"); imgEl.src = imgData.src; imgEl.alt = selectedRecipe.name; } else { imgC.classList.add("hidden"); }
      // Ingredients
      const ingList = document.getElementById("modal-ingredients");
      ingList.innerHTML = (selectedRecipe.ingredients||[]).map(ing => {
        let name = typeof ing === 'string' ? ing : (ing.name || ing.original || '');
        let amount = typeof ing === 'object' && ing.amount ? `${ing.amount} ${ing.unit||''}` : '';
        return `<li class="flex items-center justify-between gap-2 text-sm py-1.5 border-b border-slate-100 dark:border-slate-700 last:border-0">
          <span class="flex items-center gap-2"><span class="material-symbols-outlined text-primary text-base" style="font-variation-settings:'FILL' 1">check_circle</span><span class="text-slate-700 dark:text-slate-200">${name}</span></span>
          ${amount ? `<span class="text-xs font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full shrink-0">${amount}</span>` : ''}
        </li>`;
      }).join('');
      // Instructions
      const instSec = document.getElementById("instructions-section"); const instList = document.getElementById("modal-instructions");
      let steps = null;
      if (selectedRecipe.instructionSteps) { steps = selectedRecipe.instructionSteps; }
      else if (selectedRecipe.analyzedInstructions?.length > 0) { steps = selectedRecipe.analyzedInstructions.flatMap(i => i.steps ? i.steps.map(s => s.step) : []); }
      else if (selectedRecipe.instructions) { steps = [selectedRecipe.instructions]; }
      if (steps?.length > 0) { instSec.classList.remove("hidden"); instList.innerHTML = steps.map((s,i) => `<li class="py-1"><span class="font-black text-primary mr-1">${i+1}.</span>${s}</li>`).join(''); }
      else { instSec.classList.add("hidden"); }
      // Nutrition
      const nutSec = document.getElementById("nutrition-section"); const nutEl = document.getElementById("modal-nutrition");
      const n = selectedRecipe.nutrition;
      const hasN = n && (n.calories?.amount||n.calories||n.protein?.amount||n.protein||n.fat?.amount||n.fat);
      if (hasN) {
        nutSec.classList.remove("hidden");
        const getN = k => { if (n.nutrients) { const x=n.nutrients.find(x=>x.name===k); return x?Math.round(x.amount):null; } const v=n[k.toLowerCase()]; if(v&&typeof v==='object'&&v.amount!==undefined) return Math.round(v.amount); if(typeof v==='number') return Math.round(v); return null; };
        const c=getN("Calories")||n.calories?.amount||n.calories; const p=getN("Protein")||n.protein?.amount; const carb=getN("Carbohydrates")||n.carbohydrates?.amount; const f=getN("Fat")||n.fat?.amount;
        nutEl.innerHTML = `<div class="bg-orange-50 dark:bg-orange-900/20 p-2 rounded-xl text-center"><p class="text-xs font-bold text-orange-600 uppercase">Cal</p><p class="text-lg font-black text-orange-600">${c||'--'}</p></div><div class="bg-red-50 dark:bg-red-900/20 p-2 rounded-xl text-center"><p class="text-xs font-bold text-red-600 uppercase">Prot</p><p class="text-lg font-black text-red-600">${p?p+'g':'--'}</p></div><div class="bg-blue-50 dark:bg-blue-900/20 p-2 rounded-xl text-center"><p class="text-xs font-bold text-blue-600 uppercase">Carb</p><p class="text-lg font-black text-blue-600">${carb?carb+'g':'--'}</p></div><div class="bg-yellow-50 dark:bg-yellow-900/20 p-2 rounded-xl text-center"><p class="text-xs font-bold text-yellow-600 uppercase">Gord</p><p class="text-lg font-black text-yellow-600">${f?f+'g':'--'}</p></div>`;
      } else { nutSec.classList.add("hidden"); }
      recipeModal.classList.remove("hidden"); document.body.style.overflow = "hidden";
    };

    window.closeRecipeModal = () => { recipeModal.classList.add("hidden"); selectedRecipe = null; document.body.style.overflow = ""; };
    recipeModal.addEventListener('click', e => { if (e.target === recipeModal) closeRecipeModal(); });
    window.goToGroceryList = () => { if (selectedRecipe) { sessionStorage.setItem("pendingRecipeToGrocery", JSON.stringify({ recipeId: selectedRecipe.id, recipeName: selectedRecipe.name, ingredients: selectedRecipe.ingredients||[] })); } window.location.href = "grocery.html"; };
    window.addRecipeToNewPlan = () => { if (!selectedRecipe) return; sessionStorage.setItem("selectedRecipeId", selectedRecipe.id); window.location.href = `create-custom-plan.html?addRecipe=${selectedRecipe.id}`; };
    window.saveCurrentRecipe = async () => {
      if (!selectedRecipe) return;
      const user = auth.currentUser;
      if (!user) { alert("É necessário fazer login."); return; }
      try { await saveUserRecipe(user.uid, selectedRecipe.id); sessionStorage.setItem('savedRecipe', JSON.stringify(selectedRecipe)); window.location.href = "my-recipes.html"; }
      catch(err) { console.error(err); alert("Falha ao guardar a receita."); }
    };

    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = "index.html"; return; }
      try {
        const [recipes, pantry] = await Promise.all([
          getAllRecipes(user.uid),
          getPantry(user.uid)
        ]);
        allRecipes = recipes;
        pantryData = pantry;
        loadingState.classList.add("hidden");
        renderRecipes();
      } catch(e) { console.error(e); loadingState.classList.add("hidden"); emptyState.classList.remove("hidden"); }
    });
  </script>

  <script>
    fetch("bottom-nav.html").then(r => r.text()).then(html => {
      document.body.insertAdjacentHTML('beforeend', html);
    });
  </script>
</body>
</html>
