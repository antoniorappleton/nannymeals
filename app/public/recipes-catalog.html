<!doctype html>
<html class="light" lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NannyMeal - Catálogo de Receitas</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="src/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="manifest" href="manifest.json" />
  </head>

  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased"
  >
    <div class="app-container glass-effect">
      <!-- Header -->
      <header
        class="sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-3 sm:px-4 pt-4 sm:pt-6 pb-3 sm:pb-4 border-b border-primary/10"
      >
        <div class="flex items-center justify-between mb-3">
          <h1 class="text-lg sm:text-xl font-extrabold tracking-tight">
            Catálogo de Receitas
          </h1>
          <button
            id="btn-logout"
            class="p-2 -mr-2 rounded-full hover:bg-primary/10 transition-colors text-slate-400 min-h-10 min-w-10 flex items-center justify-center"
          >
            <span class="material-symbols-outlined">logout</span>
          </button>
        </div>

        <!-- Search & Filter -->
        <div class="space-y-3">
          <input
            type="text"
            id="search-input"
            placeholder="Procurar receita..."
            class="w-full px-3 sm:px-4 py-2.5 sm:py-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-primary text-sm"
          />

          <div
            class="flex gap-1 sm:gap-2 overflow-x-auto pb-2 -mx-3 sm:-mx-4 px-3 sm:px-4"
          >
            <button
              class="filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-bold uppercase tracking-widest bg-primary text-slate-900 shrink-0"
              data-filter="all"
            >
              Todas
            </button>
            <button
              class="filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-bold uppercase tracking-widest bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-slate-900 transition-all shrink-0"
              data-filter="fast"
            >
              Rapidas
            </button>
            <button
              class="filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-bold uppercase tracking-widest bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-slate-900 transition-all shrink-0"
              data-filter="vegetarian"
            >
              Veg.
            </button>
            <button
              class="filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-bold uppercase tracking-widest bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-slate-900 transition-all shrink-0"
              data-filter="kid-friendly"
            >
              Criancas
            </button>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto pb-16">
        <!-- Recipes Grid -->
        <div class="p-4 space-y-4">
          <!-- Loading State -->
          <div
            id="loading-state"
            class="flex flex-col items-center justify-center py-20 text-slate-400 gap-4"
          >
            <div
              class="size-16 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center animate-pulse"
            >
              <span class="material-symbols-outlined text-4xl"
                >restaurant_menu</span
              >
            </div>
            <p class="font-bold">A carregar receitas...</p>
          </div>

          <!-- Empty State -->
          <div
            id="empty-state"
            class="hidden flex flex-col items-center justify-center py-20 text-slate-400 gap-4"
          >
            <div
              class="size-16 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center"
            >
              <span class="material-symbols-outlined text-4xl">search_off</span>
            </div>
            <p class="font-bold">Nenhuma receita encontrada</p>
            <p class="text-sm">Tenta mudar os filtros ou a pesquisa</p>
          </div>

          <!-- Recipes Grid -->
          <div id="recipes-grid" class="grid grid-cols-2 gap-3">
            <!-- Dynamic recipes will be injected here -->
          </div>
        </div>
      </main>
      <!-- Bottom Navigation Bar will be included dynamically -->

      <!-- Recipe Detail Modal - Improved -->
      <div
        id="recipe-modal"
        class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-md"
      >
        <!-- Modal Container - Aligned to top with scroll -->
        <div class="w-full max-w-lg mx-auto mt-4 mb-4 h-[calc(100vh-2rem)]">
          <div
            class="h-full bg-white dark:bg-slate-900 rounded-3xl flex flex-col overflow-hidden shadow-2xl border border-slate-200 dark:border-slate-700"
          >
            <!-- Header - Always visible -->
            <div
              class="shrink-0 bg-gradient-to-r from-primary/20 to-primary/5 dark:from-slate-800 dark:to-slate-900 p-4 sm:p-6 border-b border-slate-200 dark:border-slate-700"
            >
              <div class="flex items-start justify-between gap-3">
                <div class="flex-1 min-w-0">
                  <h2
                    id="modal-recipe-name"
                    class="text-xl sm:text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white leading-tight"
                  ></h2>
                  <div
                    class="flex flex-wrap gap-2 mt-2"
                    id="modal-tags-container"
                  >
                    <!-- Tags will be inserted here -->
                  </div>
                </div>
                <button
                  onclick="closeRecipeModal()"
                  class="shrink-0 p-2 sm:p-3 rounded-full bg-white dark:bg-slate-800 shadow-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-all"
                >
                  <span
                    class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-xl"
                    >close</span
                  >
                </button>
              </div>

              <!-- Meta info row -->
              <div class="flex flex-wrap gap-3 mt-4">
                <div
                  class="flex items-center gap-2 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-full shadow-sm"
                >
                  <span class="material-symbols-outlined text-primary text-lg"
                    >schedule</span
                  >
                  <span
                    class="text-sm font-bold text-slate-700 dark:text-slate-200"
                    id="modal-prep-time"
                    >--</span
                  >
                </div>
                <div
                  id="modal-price-container"
                  class="flex items-center gap-2 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-full shadow-sm hidden"
                >
                  <span class="material-symbols-outlined text-green-600 text-lg"
                    >euro</span
                  >
                  <span
                    class="text-sm font-bold text-green-600"
                    id="modal-price"
                    >--</span
                  >
                </div>
                <div
                  id="modal-calories-container"
                  class="flex items-center gap-2 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-full shadow-sm hidden"
                >
                  <span
                    class="material-symbols-outlined text-orange-500 text-lg"
                    >local_fire_department</span
                  >
                  <span
                    class="text-sm font-bold text-orange-500"
                    id="modal-calories"
                    >--</span
                  >
                </div>
              </div>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4">
              <!-- Ingredients Section -->
              <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700"
              >
                <h3
                  class="font-bold text-sm uppercase tracking-widest text-primary mb-3 flex items-center gap-2"
                >
                  <span class="material-symbols-outlined">shopping_basket</span>
                  Ingredientes
                </h3>
                <ul id="modal-ingredients" class="space-y-2">
                  <!-- Dynamic ingredients -->
                </ul>
              </div>

              <!-- Instructions Section -->
              <div
                id="instructions-section"
                class="bg-white dark:bg-slate-800 rounded-2xl p-4 border border-slate-100 dark:border-slate-700 hidden"
              >
                <h3
                  class="font-bold text-sm uppercase tracking-widest text-primary mb-3 flex items-center gap-2"
                >
                  <span class="material-symbols-outlined">menu_book</span>
                  Modo de Preparação
                </h3>
                <ol
                  id="modal-instructions"
                  class="list-decimal list-inside space-y-2 text-sm leading-relaxed text-slate-600 dark:text-slate-300"
                >
                  --
                </ol>
              </div>

              <!-- Nutrition Info (if available) -->
              <div id="nutrition-section" class="hidden">
                <h3
                  class="font-bold text-sm uppercase tracking-widest text-slate-500 mb-3"
                >
                  Informação Nutricional
                </h3>
                <div id="modal-nutrition" class="grid grid-cols-4 gap-2">
                  <!-- Nutrition cards will be inserted here -->
                </div>
              </div>
            </div>

            <!-- Action Buttons - Fixed at bottom -->
            <div
              class="shrink-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700 p-4"
            >
              <div class="grid grid-cols-2 gap-2">
                <button
                  onclick="addRecipeToNewPlan()"
                  class="bg-primary text-slate-900 py-3 sm:py-4 px-4 rounded-2xl font-black text-sm sm:text-xs uppercase tracking-widest shadow-lg shadow-primary/30 hover:shadow-xl hover:scale-[0.98] transition-all flex items-center justify-center gap-2"
                >
                  <span class="material-symbols-outlined">add_circle</span>
                  <span class="hidden sm:inline">Adicionar ao</span> Plano
                </button>
                <button
                  onclick="goToGroceryList()"
                  class="bg-green-500 text-white py-3 sm:py-4 px-4 rounded-2xl font-black text-sm sm:text-xs uppercase tracking-widest shadow-lg shadow-green-500/30 hover:shadow-xl hover:scale-[0.98] transition-all flex items-center justify-center gap-2"
                >
                  <span class="material-symbols-outlined">shopping_cart</span>
                  Comprar
                </button>
              </div>
              <div class="grid grid-cols-2 gap-2 mt-2">
                <button
                  onclick="saveCurrentRecipe()"
                  class="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-2.5 px-4 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-slate-200 dark:hover:bg-slate-600 transition-all flex items-center justify-center gap-1"
                >
                  <span class="material-symbols-outlined text-lg"
                    >bookmark</span
                  >
                  Guardar
                </button>
                <button
                  onclick="closeRecipeModal()"
                  class="bg-transparent border-2 border-slate-300 dark:border-slate-600 text-slate-500 py-2.5 px-4 rounded-xl font-bold text-xs uppercase tracking-widest hover:border-slate-400 hover:text-slate-600 transition-all"
                >
                  Fechar
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
      import { auth } from "./src/firebase-init.js";
      import { getAllRecipes, saveUserRecipe } from "./src/db.js";
      import { logout } from "./src/auth.js";

      const loadingState = document.getElementById("loading-state");
      const emptyState = document.getElementById("empty-state");
      const recipesGrid = document.getElementById("recipes-grid");
      const searchInput = document.getElementById("search-input");
      const filterButtons = document.querySelectorAll(".filter-btn");
      const recipeModal = document.getElementById("recipe-modal");

      let allRecipes = [];
      let currentFilter = "all";
      let currentSearchTerm = "";
      let selectedRecipe = null;

      // Logout
      document.getElementById("btn-logout").onclick = () => logout();

      // Filter handling
      filterButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          filterButtons.forEach((b) => {
            b.classList.remove("bg-primary", "text-slate-900");
            b.classList.add(
              "bg-slate-200",
              "dark:bg-slate-700",
              "text-slate-700",
              "dark:text-slate-300",
            );
          });
          btn.classList.add("bg-primary", "text-slate-900");
          btn.classList.remove(
            "bg-slate-200",
            "dark:bg-slate-700",
            "text-slate-700",
            "dark:text-slate-300",
          );
          currentFilter = btn.dataset.filter;
          renderRecipes();
        });
      });

      // Search handling
      searchInput.addEventListener("input", (e) => {
        currentSearchTerm = e.target.value.toLowerCase();
        renderRecipes();
      });

      const filterRecipes = () => {
        let filtered = allRecipes;

        if (currentFilter !== "all") {
          filtered = filtered.filter(
            (r) => r.tags && r.tags.includes(currentFilter),
          );
        }

        if (currentSearchTerm) {
          filtered = filtered.filter(
            (r) =>
              r.name.toLowerCase().includes(currentSearchTerm) ||
              (r.tags &&
                r.tags.some((t) =>
                  t.toLowerCase().includes(currentSearchTerm),
                )),
          );
        }

        return filtered;
      };

      const renderRecipes = () => {
        const filtered = filterRecipes();

        if (filtered.length === 0) {
          loadingState.classList.add("hidden");
          emptyState.classList.remove("hidden");
          recipesGrid.innerHTML = "";
          return;
        }

        loadingState.classList.add("hidden");
        emptyState.classList.add("hidden");

        recipesGrid.innerHTML = filtered
          .map(
            (recipe) => `
        <div class="bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-lg border border-slate-100 dark:border-slate-800 cursor-pointer hover:shadow-xl hover:scale-105 transition-all" onclick="openRecipeDetail('${recipe.id}')">
          <div class="p-4 space-y-3">
            <h3 class="font-bold text-sm leading-tight line-clamp-2">${recipe.name}</h3>
            
            <div class="flex items-center gap-2 text-xs text-slate-500">
              <span class="material-symbols-outlined text-sm">schedule</span>
              <span>${recipe.prepTime}min</span>
            </div>

            <div class="flex flex-wrap gap-1">
              ${(recipe.tags || [])
                .slice(0, 2)
                .map(
                  (tag) => `
                <span class="text-[10px] font-bold bg-primary/10 text-primary px-2 py-1 rounded-full">${tag}</span>
              `,
                )
                .join("")}
            </div>

            <button onclick="event.stopPropagation(); openRecipeDetail('${recipe.id}')" class="w-full mt-2 bg-primary text-slate-900 py-2 rounded-lg font-bold text-xs uppercase tracking-widest hover:bg-primary/90 transition-all">
              Ver Detalhes
            </button>
          </div>
        </div>
      `,
          )
          .join("");
      };

      window.openRecipeDetail = (recipeId) => {
        selectedRecipe = allRecipes.find((r) => r.id === recipeId);
        if (!selectedRecipe) return;

        // Name
        document.getElementById("modal-recipe-name").textContent =
          selectedRecipe.name;

        // Tags - now in a container
        const tagsContainer = document.getElementById("modal-tags-container");
        tagsContainer.innerHTML = (selectedRecipe.tags || [])
          .map(
            (tag) =>
              `<span class="text-[10px] font-bold bg-primary/20 text-primary px-2 py-1 rounded-full capitalize">${tag}</span>`,
          )
          .join("");

        // Prep time
        document.getElementById("modal-prep-time").textContent =
          `${selectedRecipe.prepTime || "--"} min`;

        // Price (if available from Spoonacular)
        const priceContainer = document.getElementById("modal-price-container");
        const priceEl = document.getElementById("modal-price");
        if (selectedRecipe.pricePerServing) {
          priceContainer.classList.remove("hidden");
          priceEl.textContent = `${selectedRecipe.pricePerServing}€/porção`;
        } else {
          priceContainer.classList.add("hidden");
        }

        // Calories (if available from Spoonacular)
        const caloriesContainer = document.getElementById(
          "modal-calories-container",
        );
        const caloriesEl = document.getElementById("modal-calories");
        if (selectedRecipe.calories) {
          caloriesContainer.classList.remove("hidden");
          caloriesEl.textContent = `${selectedRecipe.calories} kcal`;
        } else {
          caloriesContainer.classList.add("hidden");
        }

        // Ingredients - now with quantities if available
        const ingredientsList = document.getElementById("modal-ingredients");
        const ingredients = selectedRecipe.ingredients || [];

        // Handle both string array and object array (Spoonacular format)
        ingredientsList.innerHTML = ingredients
          .map((ing) => {
            let name = "";
            let amount = "";

            if (typeof ing === "string") {
              name = ing;
            } else if (typeof ing === "object") {
              // Spoonacular format: { name, amount, unit, original }
              name = ing.name || ing.original || ing.originalString || "";
              amount = ing.amount ? `${ing.amount} ${ing.unit || ""}` : "";
            }

            return `
              <li class="flex items-center justify-between gap-2 text-sm py-1.5 border-b border-slate-100 dark:border-slate-700 last:border-0">
                <span class="flex items-center gap-2">
                  <span class="material-symbols-outlined text-primary text-lg">check_circle</span>
                  <span class="text-slate-700 dark:text-slate-200">${name}</span>
                </span>
                ${amount ? `<span class="text-xs font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full">${amount}</span>` : ""}
              </li>
            `;
          })
          .join("");

        // Instructions
        const instructionsSection = document.getElementById(
          "instructions-section",
        );
        const instructionsList = document.getElementById("modal-instructions");

        // Check for instructionSteps (new array format) first, then fall back to instructions (string)
        const steps =
          selectedRecipe.instructionSteps ||
          (selectedRecipe.instructions ? [selectedRecipe.instructions] : null);

        if (steps && steps.length > 0) {
          instructionsSection.classList.remove("hidden");
          instructionsList.innerHTML = steps
            .map((step, index) => `<li class="py-1">${step}</li>`)
            .join("");
        } else {
          instructionsSection.classList.add("hidden");
        }

        // Nutrition (if available)
        const nutritionSection = document.getElementById("nutrition-section");
        const nutrition = selectedRecipe.nutrition;
        if (
          nutrition &&
          (nutrition.calories ||
            nutrition.protein ||
            nutrition.carbs ||
            nutrition.fat)
        ) {
          nutritionSection.classList.remove("hidden");
          const nutritionEl = document.getElementById("modal-nutrition");
          const nutrients = nutrition.nutrients || [];
          const getNutrient = (name) => {
            const n = nutrients.find((x) => x.name === name);
            return n ? Math.round(n.amount) : "--";
          };

          nutritionEl.innerHTML = `
            <div class="bg-orange-50 dark:bg-orange-900/20 p-2 rounded-xl text-center">
              <p class="text-xs font-bold text-orange-600 uppercase">Cal</p>
              <p class="text-lg font-black text-orange-600">${getNutrient("Calories")}</p>
            </div>
            <div class="bg-red-50 dark:bg-red-900/20 p-2 rounded-xl text-center">
              <p class="text-xs font-bold text-red-600 uppercase">Prot</p>
              <p class="text-lg font-black text-red-600">${getNutrient("Protein")}g</p>
            </div>
            <div class="bg-blue-50 dark:bg-blue-900/20 p-2 rounded-xl text-center">
              <p class="text-xs font-bold text-blue-600 uppercase">Carb</p>
              <p class="text-lg font-black text-blue-600">${getNutrient("Carbohydrates")}g</p>
            </div>
            <div class="bg-yellow-50 dark:bg-yellow-900/20 p-2 rounded-xl text-center">
              <p class="text-xs font-bold text-yellow-600 uppercase">Gord</p>
              <p class="text-lg font-black text-yellow-600">${getNutrient("Fat")}g</p>
            </div>
          `;
        } else {
          nutritionSection.classList.add("hidden");
        }

        // Scroll to top
        const modalContent = recipeModal.querySelector(".max-w-lg");
        if (modalContent) {
          modalContent.scrollTop = 0;
        }

        recipeModal.classList.remove("hidden");
      };

      // Close modal function
      window.closeRecipeModal = () => {
        recipeModal.classList.add("hidden");
        selectedRecipe = null;
      };

      // Go to grocery list
      window.goToGroceryList = () => {
        if (selectedRecipe) {
          // Add recipe to current plan's grocery list
          sessionStorage.setItem(
            "pendingRecipeToGrocery",
            JSON.stringify({
              recipeId: selectedRecipe.id,
              recipeName: selectedRecipe.name,
              ingredients: selectedRecipe.ingredients || [],
            }),
          );
        }
        window.location.href = "grocery.html";
      };

      window.addRecipeToNewPlan = () => {
        if (!selectedRecipe) return;
        // Guardamos o ID da receita selecionada em sessionStorage
        sessionStorage.setItem("selectedRecipeId", selectedRecipe.id);
        // Redirecionamos para criar plano customizado
        window.location.href = `create-custom-plan.html?addRecipe=${selectedRecipe.id}`;
      };

      window.saveCurrentRecipe = async () => {
        if (!selectedRecipe) return;
        const user = auth.currentUser;
        if (!user) {
          alert("É necessário fazer login para guardar receitas.");
          return;
        }
        try {
          await saveUserRecipe(user.uid, selectedRecipe.id);
          alert("Receita adicionada à sua coleção pessoal!");
        } catch (err) {
          console.error("Erro ao guardar receita:", err);
          alert("Falha ao guardar a receita. Veja consola.");
        }
      };

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          try {
            allRecipes = await getAllRecipes(user.uid);
            renderRecipes();
          } catch (error) {
            console.error("Erro ao carregar receitas:", error);
            emptyState.classList.remove("hidden");
            loadingState.classList.add("hidden");
          }
        } else {
          window.location.href = "index.html";
        }
      });

      console.log("Catálogo de Receitas carregado [V1]");
    </script>
  </body>
  <script>
    // Dynamic include for bottom navigation
    fetch("bottom-nav.html")
      .then((res) => res.text())
      .then((html) => {
        const temp = document.createElement("div");
        temp.innerHTML = html;
        document.body.appendChild(temp.firstElementChild);
        // After nav is loaded, highlight active
        const script = document.createElement("script");
        script.src = "active-screen.js";
        document.body.appendChild(script);
      });
  </script>
</html>
