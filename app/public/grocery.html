<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NannyMeals — Lista de Compras</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="src/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="manifest" href="manifest.json" />
  <script type="module" src="src/auth.js?v=29"></script>
  <style>
    body { min-height: 100dvh; }

    .progress-bar-track {
      height: 6px;
      background: #e4ede7;
      border-radius: 99px;
      overflow: hidden;
    }
    html.dark .progress-bar-track { background: #1e2d22; }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #13ec5b, #0fbb47);
      border-radius: 99px;
      transition: width 500ms cubic-bezier(0.4,0,0.2,1);
    }

    .grocery-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .grocery-item:hover { background: rgba(19,236,91,0.04); }
    .grocery-item:active { background: rgba(19,236,91,0.08); }

    .grocery-checkbox {
      width: 24px; height: 24px; border-radius: 8px;
      border: 2px solid #d1d9d4;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 200ms ease;
    }
    .grocery-item[data-checked="true"] .grocery-checkbox {
      background: #13ec5b;
      border-color: #13ec5b;
    }
    .grocery-item[data-checked="true"] .item-name {
      text-decoration: line-through;
      color: #9ca8a0;
    }
    .grocery-item[data-checked="true"] .check-icon { opacity: 1; transform: scale(1); }
    .check-icon { opacity: 0; transform: scale(0); transition: all 200ms cubic-bezier(0.34,1.56,0.64,1); }

    .category-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 6px;
    }

    .supermarket-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-radius: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 180ms ease;
      border: none;
      color: white;
    }
    .supermarket-btn:hover { transform: translateY(-1px); }
    .supermarket-btn:active { transform: scale(0.98); }
  </style>
  <script>
    (function() {
      const saved = localStorage.getItem('nm_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
    })();
    if (localStorage.getItem('app_version') !== 'v29') {
      localStorage.setItem('app_version', 'v29');
      if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      if ('caches' in window) caches.keys().then(names => { names.forEach(n => caches.delete(n)); setTimeout(() => window.location.reload(true), 500); });
    }
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
  <div class="app-container">

    <!-- ── Header ──────────────────────────────── -->
    <header class="sticky top-0 z-20 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-slate-100 dark:border-border-dark px-4 lg:px-6 pt-5 pb-4">
      <div class="flex items-center justify-between mb-3">
        <div>
          <p class="text-[10px] font-black uppercase tracking-[0.2em] text-muted" id="current-grocery-header">A carregar...</p>
          <h1 class="text-xl font-black tracking-tight mt-0.5">Lista de Compras</h1>
        </div>
        <div class="flex items-center gap-2">
          <div id="cost-badge" class="hidden bg-primary/15 text-primary font-black text-sm px-3 py-1.5 rounded-full">
            <span id="total-cost-display">0</span>€
          </div>
          <button id="btn-supermarkets" title="Supermercados" class="size-10 rounded-full bg-primary text-slate-900 hover:bg-primary-dark flex items-center justify-center shadow-glow transition-all">
            <span class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL' 1">store</span>
          </button>
          <button id="btn-logout" class="size-10 rounded-full hover:bg-primary/10 text-slate-400 hover:text-primary flex items-center justify-center transition-colors">
            <span class="material-symbols-outlined text-xl">logout</span>
          </button>
        </div>
      </div>

      <!-- Progress bar -->
      <div id="progress-container" class="hidden space-y-1.5">
        <div class="flex justify-between items-center">
          <span class="text-xs font-bold text-muted">Progresso</span>
          <span class="text-xs font-black text-primary" id="progress-label">0 / 0</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- ── Main ──────────────────────────────────── -->
    <main id="grocery-list-container" class="flex-1 overflow-y-auto pb-safe">
      <div class="p-4 lg:p-6 space-y-2">

        <!-- Loading skeleton -->
        <div id="loading-state" class="space-y-4">
          ${[1,2,3].map(() => `
            <div>
              <div class="skeleton h-4 w-24 rounded mb-3 mx-4"></div>
              <div class="bg-white dark:bg-surface-dark rounded-2xl border border-slate-100 dark:border-border-dark overflow-hidden divide-y divide-slate-50 dark:divide-border-dark">
                ${[1,2,3].map(() => `<div class="flex items-center gap-3 p-4"><div class="skeleton size-6 rounded-lg shrink-0"></div><div class="flex-1 space-y-1.5"><div class="skeleton h-3 w-2/3 rounded"></div><div class="skeleton h-2.5 w-1/3 rounded"></div></div></div>`).join('')}
              </div>
            </div>`).join('')}
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 gap-5 text-muted">
          <div class="size-24 rounded-4xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
            <span class="material-symbols-outlined text-5xl">shopping_cart</span>
          </div>
          <div class="text-center">
            <p class="font-black text-slate-700 dark:text-slate-200 text-lg">Lista vazia</p>
            <p class="text-sm mt-1">Gera um plano semanal para criar a tua lista</p>
          </div>
          <div class="flex gap-3 flex-wrap justify-center">
            <button onclick="window.location.href='plan.html'" class="bg-primary text-slate-900 px-6 py-3 rounded-2xl font-black shadow-glow uppercase tracking-widest text-xs">Ir ao Plano</button>
            <button id="btn-generate-auto" class="bg-white dark:bg-surface-dark text-primary border-2 border-primary px-6 py-3 rounded-2xl font-black uppercase tracking-widest text-xs">Gerar Plano</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- ── Supermarket Modal ──────────────────────── -->
  <div id="supermarket-modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end lg:items-center justify-center p-0 lg:p-6">
    <div class="w-full lg:max-w-md bg-white dark:bg-surface-dark rounded-t-3xl lg:rounded-3xl overflow-hidden shadow-2xl border border-slate-200 dark:border-border-dark animate-scale-in">
      <div class="p-5 border-b border-slate-100 dark:border-border-dark flex items-center justify-between">
        <div>
          <h2 class="text-xl font-black">Supermercados</h2>
          <p class="text-xs text-muted mt-0.5">Exportar lista de compras</p>
        </div>
        <button onclick="closeSupermarketModal()" class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
          <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">close</span>
        </button>
      </div>
      <div class="p-5 space-y-3">
        <p class="text-sm text-muted mb-2">Escolhe o supermercado para adicionar os ingredientes:</p>
        <button onclick="openSupermarket('continente')" class="supermarket-btn w-full" style="background:#0073A7">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">shopping_cart</span>
            <div class="text-left"><p class="font-black text-lg">Continente</p><p class="text-xs opacity-80">Abrir no website</p></div>
          </div>
          <span class="material-symbols-outlined">arrow_forward_ios</span>
        </button>
        <button onclick="openSupermarket('pingodoce')" class="supermarket-btn w-full" style="background:#00A04A">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">shopping_cart</span>
            <div class="text-left"><p class="font-black text-lg">Pingo Doce</p><p class="text-xs opacity-80">Abrir no website</p></div>
          </div>
          <span class="material-symbols-outlined">arrow_forward_ios</span>
        </button>
        <button onclick="openSupermarket('auchan')" class="supermarket-btn w-full" style="background:#E30613">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">shopping_cart</span>
            <div class="text-left"><p class="font-black text-lg">Auchan</p><p class="text-xs opacity-80">Abrir no website</p></div>
          </div>
          <span class="material-symbols-outlined">arrow_forward_ios</span>
        </button>
        <button onclick="openSupermarket('intermarche')" class="supermarket-btn w-full" style="background:#FF6600">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">shopping_cart</span>
            <div class="text-left"><p class="font-black text-lg">Intermarché</p><p class="text-xs opacity-80">Abrir no website</p></div>
          </div>
          <span class="material-symbols-outlined">arrow_forward_ios</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
    import { auth } from "./src/firebase-init.js";
    import { logout } from "./src/auth.js";
    import { 
      getLastPlan, 
      getHousehold, 
      getPlanById, 
      generateGroceryListFromPlan, 
      generateWeeklyPlan,
      getPantry,
      normalizeIngredientName
    } from "./src/db.js";
    import { generateSupermarketLink } from "./src/supermarket-links.js";

    let currentGroceryList = [], currentIngredients = [];
    let totalItems = 0, checkedItems = 0;
    let pantryData = {};

    const groceryContainer = document.getElementById("grocery-list-container");
    const loadingState = document.getElementById("loading-state");
    const emptyState = document.getElementById("empty-state");
    const supermarketModal = document.getElementById("supermarket-modal");
    const progressContainer = document.getElementById("progress-container");
    const progressFill = document.getElementById("progress-fill");
    const progressLabel = document.getElementById("progress-label");

    document.getElementById("btn-logout").onclick = () => logout();
    document.getElementById("btn-supermarkets").onclick = () => {
      if (currentIngredients.length > 0) { supermarketModal.classList.remove("hidden"); document.body.style.overflow = "hidden"; }
      else alert("Gera um plano primeiro para ver os supermercados!");
    };

    window.closeSupermarketModal = () => { supermarketModal.classList.add("hidden"); document.body.style.overflow = ""; };
    supermarketModal.onclick = e => { if (e.target === supermarketModal) closeSupermarketModal(); };
    window.openSupermarket = id => {
      const link = generateSupermarketLink(id, currentIngredients);
      if (link?.webLink) window.open(link.webLink, '_blank');
    };

    function updateProgress() {
      if (totalItems === 0) return;
      progressContainer.classList.remove("hidden");
      const pct = Math.round((checkedItems / totalItems) * 100);
      progressFill.style.width = `${pct}%`;
      progressLabel.textContent = `${checkedItems} / ${totalItems}`;
    }

    const getCategoryIcon = (name) => {
      if (!name) return '📦';
      if (name.includes('Reabastecer')) return '🔄';
      const categoryIcon = {
        'Frutas e Legumes':'🥦', 'Hortofrutícolas':'🥦', 'Hortifrutis':'🥦', 'Hortofruticolas':'🥦',
        'Legumes e Frutas':'🥦', 'Verduras':'🥦', 'Vegetais':'🥦', 'Frutas':'🍎',
        'Carnes e Peixes':'🥩', 'Carnes':'🥩', 'Carne':'🥩', 'Peixes':'🐟', 'Peixe':'🐟',
        'Peixe e Marisco':'🐟', 'Carnes, Peixes e Ovos':'🥩',
        'Lacticínios':'🥛', 'Lacticinios':'🥛', 'Laticínios':'🥛', 'Ovos':'🥚',
        'Mercearia':'🛒', 'Despensa':'🫙', 'Enlatados':'🥫', 'Padaria':'🍞',
        'Massas e Arroz':'🍝', 'Condimentos':'🧂', 'Bebidas':'🥤', 'Congelados':'🧊', 'Geral':'🛍️'
      };
      if (categoryIcon[name]) return categoryIcon[name];
      const lower = name.toLowerCase();
      if (lower.includes('horto') || lower.includes('legum') || lower.includes('fruta')) return '🥦';
      if (lower.includes('carne') || lower.includes('peixe')) return '🥩';
      if (lower.includes('leite') || lower.includes('queijo')) return '🥛';
      if (lower.includes('pão') || lower.includes('padari')) return '🍞';
      return '📦';
    };

    function renderGroceryList(categories) {
      loadingState.classList.add("hidden");
      emptyState.classList.add("hidden");
      const wrapper = groceryContainer.querySelector("div");
      wrapper.innerHTML = ""; // Clear existing

      totalItems = categories.reduce((a, c) => a + c.items.length, 0);
      checkedItems = 0;

      categories.forEach((cat, idx) => {
        const section = document.createElement("section");
        const icon = getCategoryIcon(cat.category);
        
        section.innerHTML = `
          <div class="category-header">
            <span class="text-lg">${icon}</span>
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-muted">${cat.category}</span>
          </div>
          <div class="bg-white dark:bg-surface-dark rounded-2xl border border-slate-100 dark:border-border-dark shadow-card overflow-hidden divide-y divide-slate-50 dark:divide-border-dark" id="cat-items-${idx}"></div>
        `;
        wrapper.appendChild(section);

        const itemsContainer = section.querySelector(`#cat-items-${idx}`);
        cat.items.forEach(item => {
          const normName = normalizeIngredientName(item.name);
          const pantryStatus = pantryData[normName] || pantryData[Object.keys(pantryData).find(k => normName.includes(k) || k.includes(normName))];
          const hasInPantry = pantryStatus === 'ok';

          const itemEl = document.createElement("div");
          itemEl.className = `grocery-item ${hasInPantry ? 'opacity-60 bg-slate-50 dark:bg-slate-900/40' : ''}`;
          itemEl.setAttribute("data-checked", item.checked ? "true" : "false");
          if (item.checked) checkedItems++;
          
          itemEl.innerHTML = `
            <div class="grocery-checkbox">
              <span class="material-symbols-outlined text-white text-base check-icon" style="font-variation-settings:'FILL' 1">check</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <p class="font-bold text-sm item-name">${item.name}</p>
                ${hasInPantry ? '<span class="text-[8px] font-black px-1.5 py-0.5 rounded-full bg-blue-100 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400 uppercase tracking-widest">Já tens</span>' : ''}
              </div>
              <div class="flex items-center gap-3 mt-0.5">
                <span class="text-[10px] font-bold uppercase tracking-widest text-muted">${item.quantity || ''}</span>
              </div>
            </div>`;
          itemEl.onclick = () => {
            const wasChecked = itemEl.getAttribute("data-checked") === "true";
            itemEl.setAttribute("data-checked", wasChecked ? "false" : "true");
            if (wasChecked) checkedItems--; else checkedItems++;
            updateProgress();
          };
          itemsContainer.appendChild(itemEl);
        });
      });
      updateProgress();
    }

    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = "index.html"; return; }
      try {
        const [plan, pantry] = await Promise.all([getLastPlan(user.uid), getPantry(user.uid)]);
        pantryData = pantry.items || {};

        if (plan) {
          let list = plan.groceryList || [];
          if (list.length === 0) list = await generateGroceryListFromPlan(plan.id);
          
          if (list?.length > 0) {
            currentGroceryList = list;
            currentIngredients = list.flatMap(c => c.items.map(i => i.name));
            renderGroceryList(list);
            document.getElementById("current-grocery-header").textContent = `${list.reduce((a,c)=>a+c.items.length,0)} ITENS · ESTIMATIVA ATIVA`;
            
            if (plan.totalEstimatedCost) {
               document.getElementById("cost-badge").classList.remove("hidden");
               document.getElementById("total-cost-display").textContent = plan.totalEstimatedCost;
            }
          } else { loadingState.classList.add("hidden"); emptyState.classList.remove("hidden"); }
        } else { loadingState.classList.add("hidden"); emptyState.classList.remove("hidden"); }

        document.getElementById("btn-generate-auto").onclick = async () => {
           const btn = document.getElementById("btn-generate-auto");
           btn.disabled = true; btn.textContent = "A gerar...";
           const created = await generateWeeklyPlan(user.uid);
           if (created) window.location.reload();
           btn.disabled = false; btn.textContent = "Gerar Plano";
        };
      } catch(err) { console.error(err); loadingState.classList.add("hidden"); emptyState.classList.remove("hidden"); }
    });
  </script>

  <script>
    fetch('bottom-nav.html').then(r => r.text()).then(html => {
      document.body.insertAdjacentHTML('beforeend', html);
    });
  </script>
</body>
</html>
