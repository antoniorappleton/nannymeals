<!DOCTYPE html>
<html class="light" lang="pt">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>NannyMeal - Lista de Compras</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="src/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="manifest" href="manifest.json" />
  <style>
    body {
      min-height: 100dvh;
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
  <div class="app-container glass-effect">
    <!-- Header -->
    <header
      class="sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 pt-8 pb-4 border-b border-primary/10">
      <div class="flex items-center justify-between mb-2">
        <h1 class="text-xl font-extrabold tracking-tight">Lista de Compras</h1>
        <button id="btn-logout" class="p-2 -mr-2 rounded-full hover:bg-primary/10 transition-colors text-slate-400">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
      <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]" id="current-grocery-header">ITENS
        NECESSÁRIOS • SEMANA ATIVA</p>
    </header>

    <main id="grocery-list" class="flex-1 overflow-y-auto px-4 py-8 space-y-8 pb-32">
      <!-- Dynamic grocery categories will be injected here -->
      <div class="flex flex-col items-center justify-center py-20 text-slate-400 gap-4">
        <div class="size-16 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center animate-pulse">
          <span class="material-symbols-outlined text-4xl">shopping_cart</span>
        </div>
        <p class="font-bold">A carregar a vossa lista...</p>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-30">
      <nav
        class="flex justify-around items-center bg-white dark:bg-slate-900 px-4 pb-8 pt-4 border-t border-slate-100 dark:border-slate-800 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
        <a class="flex flex-col items-center gap-1 text-slate-400 group hover:text-primary transition-all"
          href="dashboard.html">
          <span class="material-symbols-outlined">monitoring</span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400 group hover:text-primary transition-all"
          href="plan.html">
          <span class="material-symbols-outlined">calendar_today</span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Plano</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-primary" href="grocery.html">
          <span class="material-symbols-outlined font-bold">shopping_basket</span>
          <span class="text-[10px] font-black uppercase tracking-widest">Lista</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-slate-400 group hover:text-primary transition-all"
          href="onboarding.html">
          <span class="material-symbols-outlined">person</span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Perfil</span>
        </a>
      </nav>
    </div>
  </div>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
    import { auth } from "./src/firebase-init.js";
    import { getLastPlan, logout } from "./src/db.js";

    const groceryListContainer = document.getElementById("grocery-list");
    document.getElementById("btn-logout").onclick = () => logout();

    const renderGroceryList = (plan) => {
      if (!plan || !plan.groceryList || plan.groceryList.length === 0) {
        groceryListContainer.innerHTML = `
          <div class="py-12 text-center space-y-4">
            <p class="text-slate-500 font-medium">Ainda não tens itens na lista. Gera um plano primeiro!</p>
            <button onclick="window.location.href='plan.html'" class="bg-primary text-slate-900 px-8 py-4 rounded-2xl font-black shadow-premium uppercase tracking-widest text-xs">Ir para o Plano</button>
          </div>
        `;
        return;
      }

      groceryListContainer.innerHTML = plan.groceryList.map(category => `
        <section class="space-y-4">
          <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 px-2">${category.category}</h3>
          <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-premium border border-slate-100 dark:border-slate-800 overflow-hidden divide-y divide-slate-50 dark:divide-slate-800/50">
            ${category.items.map(item => `
              <label class="flex items-center gap-4 p-5 hover:bg-primary/5 transition-colors cursor-pointer group">
                <input type="checkbox" ${item.checked ? 'checked' : ''} class="size-6 rounded-lg border-slate-300 dark:border-slate-700 text-primary focus:ring-primary/20 transition-all cursor-pointer" />
                <div class="flex-1">
                  <span class="font-bold text-slate-700 dark:text-slate-200 group-has-[:checked]:line-through group-has-[:checked]:text-slate-400 transition-all text-base">${item.name}</span>
                  <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-0.5">${item.quantity}</p>
                </div>
              </label>
            `).join("")}
          </div>
        </section>
      `).join("") + `
        <div class="flex gap-4 px-2">
          <button class="flex-1 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 text-slate-500 font-black py-4 rounded-2xl shadow-premium transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm">inventory_2</span>
            Básicos
          </button>
          <button class="flex-1 bg-primary/10 border border-primary/20 text-primary font-black py-4 rounded-2xl transition-all uppercase tracking-widest text-xs flex items-center justify-center gap-2 hover:bg-primary/20">
            <span class="material-symbols-outlined text-sm">backspace</span>
            Limpar
          </button>
        </div>
      `;
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Use user.uid as HID for demo fallback
        const plan = await getLastPlan(user.uid);
        renderGroceryList(plan);
      } else {
        window.location.href = "index.html";
      }
    });
  </script>
</body>

</html>
