<!doctype html>
<html class="light" lang="pt">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>NannyMeal - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="src/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="manifest" href="manifest.json" />
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
  <div class="app-container glass-effect justify-center p-4">
    <div
      class="relative w-full bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-2xl shadow-primary/10 border border-slate-100 dark:border-slate-800 p-8">
      <!-- Welcome Header -->
      <div class="text-center mb-10">
        <h1 class="text-slate-900 dark:text-slate-50 tracking-tight text-3xl font-extrabold leading-tight"
          id="auth-title">
          Bem-vindo de volta!
        </h1>
        <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm font-medium">
          Pronto para planear a próxima refeição?
        </p>
      </div>

      <!-- Auth Form -->
      <form class="space-y-5" id="auth-form">
        <div class="space-y-1.5">
          <label
            class="text-slate-700 dark:text-slate-300 text-xs font-bold uppercase tracking-wider px-1">Email</label>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
            <input id="email"
              class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 pl-12 pr-4 h-14 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-slate-400 dark:text-white font-medium"
              placeholder="chef@familia.com" type="email" required />
          </div>
        </div>

        <div class="space-y-1.5">
          <div class="flex justify-between items-center px-1">
            <label
              class="text-slate-700 dark:text-slate-300 text-xs font-bold uppercase tracking-wider">Palavra-passe</label>
            <a id="forgot-password" class="text-primary font-bold text-xs hover:underline" href="#">Esqueceu-se?</a>
          </div>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
            <input id="password"
              class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 pl-12 pr-12 h-14 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-slate-400 dark:text-white font-medium"
              placeholder="••••••••" type="password" required />
            <button id="toggle-password"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
              type="button">
              <span class="material-symbols-outlined eye-icon">visibility</span>
              <span class="material-symbols-outlined eye-off-icon hidden">visibility_off</span>
            </button>
          </div>
        </div>

        <!-- Register Specific Fields -->
        <div id="confirm-password-container" class="space-y-1.5 hidden">
          <label class="text-slate-700 dark:text-slate-300 text-xs font-bold uppercase tracking-wider px-1">Confirmar
            Password</label>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">verified_user</span>
            <input id="confirm-password"
              class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 pl-12 pr-4 h-14 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-medium"
              placeholder="••••••••" type="password" />
          </div>
        </div>

        <div id="auth-error"
          class="hidden text-red-500 text-xs font-bold px-3 py-3 bg-red-50 dark:bg-red-900/20 rounded-xl border border-red-100 dark:border-red-800/30">
        </div>

        <button id="btn-submit"
          class="w-full bg-primary text-slate-900 font-black py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all mt-4 uppercase tracking-widest text-sm"
          type="submit">
          Entrar
        </button>

        <div class="relative py-4 flex items-center">
          <div class="flex-grow border-t border-slate-100 dark:border-slate-800"></div>
          <span class="flex-shrink mx-4 text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">ou continuar
            com</span>
          <div class="flex-grow border-t border-slate-100 dark:border-slate-800"></div>
        </div>

        <button id="btn-google"
          class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 py-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all active:scale-[0.98]"
          type="button">
          <svg class="w-5 h-5" viewbox="0 0 24 24">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"></path>
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"></path>
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              fill="#FBBC05"></path>
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"></path>
          </svg>
          <span class="text-slate-700 dark:text-slate-200 font-bold tracking-tight">Google</span>
        </button>
      </form>

      <p class="text-center mt-8 text-sm text-slate-500">
        <span id="auth-footer-text">Novo por aqui?</span>
        <button id="toggle-auth-mode" class="text-primary font-black hover:underline ml-1">Registe-se grátis</button>
      </p>
    </div>
  </div>
  <script type="module" src="src/auth.js?v=12"></script>
  <script>
    // Script de emergência para limpar cache se detectar versão antiga nos logs
    if (localStorage.getItem('app_version') !== 'v15') {
      console.log("Detectada versão antiga em cache. Forçando limpeza nuclear (v15)...");
      localStorage.setItem('app_version', 'v15');
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for (let reg of regs) reg.unregister();
        });
      }
      if ('caches' in window) {
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
          window.location.reload(true);
        });
      }
    }
  </script>
  <script type="module">
    // Registo do Service Worker (na raiz)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registrado:', reg.scope))
          .catch(err => console.log('Erro ao registrar Service Worker:', err));
      });
    }

    const setupPasswordToggle = (btnId, inputId) => {
      const btn = document.getElementById(btnId);
      const input = document.getElementById(inputId);
      if (btn && input) {
        btn.addEventListener("click", () => {
          const isPass = input.type === "password";
          input.type = isPass ? "text" : "password";
          btn.querySelector(".eye-icon").classList.toggle("hidden", isPass);
          btn.querySelector(".eye-off-icon").classList.toggle("hidden", !isPass);
        });
      }
    };

    setupPasswordToggle("toggle-password", "password");
    setupPasswordToggle("toggle-confirm-password", "confirm-password");

    // Lógica de alternância de modo (Login/Registo)
    const toggleAuthBtn = document.getElementById("toggle-auth-mode");
    const authTitle = document.querySelector("h1");
    const authBtn = document.getElementById("btn-submit");
    const authFooterText = document.getElementById("auth-footer-text");
    const forgotLink = document.getElementById("forgot-password");
    if (forgotLink) {
      forgotLink.onclick = async (e) => {
        e.preventDefault();
        const email = prompt("Insira o seu email para recuperar a palavra-passe:");
        if (email) {
          try {
            const { resetPassword } = await import("./src/auth.js?v=12");
            await resetPassword(email);
            alert("Email de recuperação enviado! Verifique a sua caixa de entrada.");
          } catch (error) {
            alert("Erro: " + error.message);
          }
        }
      };
    }
    const confirmPassContainer = document.getElementById("confirm-password-container");

    let isLoginMode = true;

    if (toggleAuthBtn) {
      toggleAuthBtn.addEventListener("click", () => {
        isLoginMode = !isLoginMode;

        if (isLoginMode) {
          authTitle.textContent = "Bem-vindo de volta, Chef!";
          authBtn.textContent = "Entrar";
          authFooterText.textContent = "Novo por aqui?";
          toggleAuthBtn.textContent = "Registe-se grátis";
          forgotLink.classList.remove("hidden");
          confirmPassContainer.classList.add("hidden");
          document.getElementById("confirm-password").required = false;
        } else {
          authTitle.textContent = "Crie a sua conta, Chef!";
          authBtn.textContent = "Criar Conta";
          authFooterText.textContent = "Já tem conta?";
          toggleAuthBtn.textContent = "Inicie sessão";
          forgotLink.classList.add("hidden");
          confirmPassContainer.classList.remove("hidden");
          document.getElementById("confirm-password").required = true;
        }

        // Guardar estado no window para o auth.js
        window.isLoginMode = isLoginMode;
      });
    }
    // Inicializar estado global
    window.isLoginMode = true;

    // Estado visual do botão Google
    const googleBtn = document.getElementById("btn-google");
    if (googleBtn) {
      window.setGoogleLoading = (loading) => {
        const text = googleBtn.querySelector("span");
        if (loading) {
          googleBtn.disabled = true;
          googleBtn.classList.add("opacity-50", "cursor-wait");
          text.textContent = "A processar login...";
        } else {
          googleBtn.disabled = false;
          googleBtn.classList.remove("opacity-50", "cursor-wait");
          text.textContent = "Google";
        }
      };
    }
  </script>
</body>

</html>
