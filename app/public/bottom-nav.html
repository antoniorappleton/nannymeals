<script>
(function() {
  // ── Active state highlighting ─────────────────
  const path = window.location.pathname.split('/').pop() || 'dashboard.html';
  const allNavItems = document.querySelectorAll('.nav-item[data-page]');
  allNavItems.forEach(link => {
    const isActive = link.getAttribute('data-page') === path;
    if (isActive) {
      link.classList.add('text-primary');
      link.classList.remove('text-slate-400', 'dark:text-slate-500');
      // Filled icon for active
      const icon = link.querySelector('.material-symbols-outlined');
      if (icon) icon.style.fontVariationSettings = "'FILL' 1";
    }
  });
  const allSidebarItems = document.querySelectorAll('.sidebar-nav-item[data-page]');
  allSidebarItems.forEach(link => {
    const isActive = link.getAttribute('data-page') === path;
    if (isActive) {
      link.classList.add('text-primary', 'bg-primary/10', 'dark:bg-primary/10');
      link.classList.remove('text-slate-500', 'dark:text-slate-400');
      const icon = link.querySelector('.material-symbols-outlined');
      if (icon) icon.style.fontVariationSettings = "'FILL' 1";
    }
  });

  // ── Dark Mode ─────────────────────────────────
  function applyTheme(dark) {
    document.documentElement.classList.toggle('dark', dark);
    document.querySelectorAll('.theme-icon-light').forEach(el => el.classList.toggle('hidden', dark));
    document.querySelectorAll('.theme-icon-dark').forEach(el => el.classList.toggle('hidden', !dark));
  }

  const saved = localStorage.getItem('nm_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved === 'dark' || (!saved && prefersDark));

  const themeBtn = document.getElementById('sidebar-theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('nm_theme', isDark ? 'light' : 'dark');
      applyTheme(!isDark);
    });
  }
})();
</script>
