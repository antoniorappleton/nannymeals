<!DOCTYPE html>
<html class="light" lang="pt">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NannyMeal - Feedback Refeição</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="src/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="manifest" href="manifest.json" />
    <style>
        body {
            min-height: 100dvh;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="app-container glass-effect">
        <!-- Header -->
        <header
            class="flex items-center px-4 pt-8 pb-4 justify-between sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
            <button onclick="history.back()"
                class="size-12 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors flex items-center justify-center text-slate-400">
                <span class="material-symbols-outlined text-2xl">close</span>
            </button>
            <h2 class="text-lg font-bold flex-1 text-center pr-12">Feedback Mensal</h2>
        </header>

        <!-- Progress Indicator -->
        <div class="px-4 py-2 space-y-3">
            <div class="flex justify-between items-end">
                <p class="text-base font-bold">Ajude-nos a melhorar</p>
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Check-in de 30s</p>
            </div>
            <div class="rounded-full bg-slate-200 dark:bg-slate-800 h-2 w-full overflow-hidden">
                <div id="progress-bar" class="h-2 rounded-full bg-primary transition-all duration-500"
                    style="width: 33%;"></div>
            </div>
        </div>

        <main class="flex-1 px-4 py-8 space-y-12 pb-32">
            <div class="text-center space-y-2">
                <h3 class="text-3xl font-extrabold tracking-tight" id="meal-name-display">Como correu hoje?</h3>
                <p class="text-sm text-slate-500">O seu feedback ajuda-nos a planear melhor a próxima semana.</p>
            </div>

            <!-- Question 1: Kids Liked It? -->
            <section
                class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-premium border border-slate-100 dark:border-slate-800">
                <h4 class="text-lg font-bold mb-6 text-center flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-primary">child_care</span>
                    As crianças gostaram?
                </h4>
                <div class="grid grid-cols-2 gap-4">
                    <button data-type="kids" data-val="classic"
                        class="feedback-btn flex flex-col items-center gap-3 bg-slate-50 dark:bg-slate-800 hover:bg-primary/10 border-2 border-transparent hover:border-primary transition-all p-5 rounded-2xl group">
                        <div
                            class="rounded-full bg-white dark:bg-slate-700 p-4 shadow-sm group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-3xl">sentiment_very_satisfied</span>
                        </div>
                        <p class="text-sm font-bold">Sucesso Total</p>
                    </button>
                    <button data-type="kids" data-val="no"
                        class="feedback-btn flex flex-col items-center gap-3 bg-slate-50 dark:bg-slate-800 hover:bg-red-50 dark:hover:bg-red-900/20 border-2 border-transparent hover:border-red-400 transition-all p-5 rounded-2xl group">
                        <div
                            class="rounded-full bg-white dark:bg-slate-700 p-4 shadow-sm group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-3xl">sentiment_dissatisfied</span>
                        </div>
                        <p class="text-sm font-bold">Não gostaram</p>
                    </button>
                </div>
            </section>

            <!-- Question 2: Easy to Cook? -->
            <section
                class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-premium border border-slate-100 dark:border-slate-800">
                <h4 class="text-lg font-bold mb-6 text-center flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-primary">skillet</span>
                    Fácil de cozinhar?
                </h4>
                <div class="grid grid-cols-2 gap-4">
                    <button data-type="ease" data-val="fast"
                        class="feedback-btn flex flex-col items-center gap-3 bg-slate-50 dark:bg-slate-800 hover:bg-primary/10 border-2 border-transparent hover:border-primary transition-all p-5 rounded-2xl group">
                        <div
                            class="rounded-full bg-white dark:bg-slate-700 p-4 shadow-sm group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-3xl">bolt</span>
                        </div>
                        <p class="text-sm font-bold">Rápido e Fácil</p>
                    </button>
                    <button data-type="ease" data-val="effort"
                        class="feedback-btn flex flex-col items-center gap-3 bg-slate-50 dark:bg-slate-800 hover:bg-amber-50 dark:hover:bg-amber-900/20 border-2 border-transparent hover:border-amber-400 transition-all p-5 rounded-2xl group">
                        <div
                            class="rounded-full bg-white dark:bg-slate-700 p-4 shadow-sm group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-3xl">restaurant</span>
                        </div>
                        <p class="text-sm font-bold">Muito trabalho</p>
                    </button>
                </div>
            </section>

            <!-- Question 3: Any Waste? -->
            <section
                class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-premium border border-slate-100 dark:border-slate-800">
                <h4 class="text-lg font-bold mb-6 text-center flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-primary">delete_outline</span>
                    Houve desperdício?
                </h4>
                <div class="grid grid-cols-2 gap-4">
                    <button data-type="waste" data-val="none"
                        class="feedback-btn flex flex-col items-center gap-3 bg-slate-50 dark:bg-slate-800 hover:bg-primary/10 border-2 border-transparent hover:border-primary transition-all p-5 rounded-2xl group">
                        <div
                            class="rounded-full bg-white dark:bg-slate-700 p-4 shadow-sm group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-3xl">check_circle</span>
                        </div>
                        <p class="text-sm font-bold">Pratos limpos</p>
                    </button>
                    <button data-type="waste" data-val="leftovers"
                        class="feedback-btn flex flex-col items-center gap-3 bg-slate-50 dark:bg-slate-800 hover:bg-orange-50 dark:hover:bg-orange-900/20 border-2 border-transparent hover:border-orange-400 transition-all p-5 rounded-2xl group">
                        <div
                            class="rounded-full bg-white dark:bg-slate-700 p-4 shadow-sm group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-3xl">delete_sweep</span>
                        </div>
                        <p class="text-sm font-bold">Sobras / Lixo</p>
                    </button>
                </div>
            </section>

            <div class="space-y-4 pt-4">
                <button id="btn-submit"
                    class="w-full bg-primary text-slate-900 font-bold py-5 rounded-2xl shadow-premium hover:scale-[0.98] active:scale-[0.95] transition-all">
                    Submeter Feedback
                </button>
                <button onclick="history.back()"
                    class="w-full bg-transparent text-slate-400 font-bold py-3 uppercase tracking-widest text-[10px] hover:text-slate-600 transition-colors">
                    Saltar por agora
                </button>
            </div>
        </main>
    </div>

    <script type="module">
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
        import { auth } from "./src/firebase-init.js";
        import { submitMealFeedback, getLastPlan } from "./src/db.js";

        let currentPlan = null;
        let selectedFeedback = { kids: null, ease: null, waste: null };

        const buttons = document.querySelectorAll(".feedback-btn");
        buttons.forEach(btn => {
            btn.onclick = () => {
                const type = btn.getAttribute("data-type");
                const val = btn.getAttribute("data-val");

                // Remove active from peers
                document.querySelectorAll(`[data-type="${type}"]`).forEach(b => {
                    b.classList.remove("border-primary", "bg-primary/10", "border-red-400", "bg-red-50", "border-amber-400", "bg-amber-50", "border-orange-400", "bg-orange-50");
                });

                // Add active style
                const activeClass = type === 'kids' && val === 'no' ? 'border-red-400 bg-red-50'
                    : type === 'ease' && val === 'effort' ? 'border-amber-400 bg-amber-50'
                        : type === 'waste' && val === 'leftovers' ? 'border-orange-400 bg-orange-50'
                            : 'border-primary bg-primary/10';

                btn.classList.add(...activeClass.split(' '));
                selectedFeedback[type] = val;

                // Update progress bar
                const count = Object.values(selectedFeedback).filter(v => v !== null).length;
                document.getElementById("progress-bar").style.width = (count * 33) + "%";
            };
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Implementation logic to find WHICH meal we are giving feedback on
                // For demo, we take the last plan and find the first non-completed/non-feedbacked meal
                // currentPlan = await getLastPlan(user.uid);
            }
        });

        document.getElementById("btn-submit").onclick = async () => {
            if (!Object.values(selectedFeedback).every(v => v !== null)) {
                alert("Por favor, responda a todas as perguntas.");
                return;
            }

            // For demo purposes, we'll assume plan info and meal index
            // await submitMealFeedback(planId, mealIndex, selectedFeedback);

            alert("Feedback enviado! Obrigado por nos ajudar a melhorar.");
            window.location.href = "dashboard.html";
        };
    </script>
</body>

</html>
