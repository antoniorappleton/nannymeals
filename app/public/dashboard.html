<!doctype html>
<html class="light" lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NannyMeal - Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="src/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/images/hero.webp" />
    <script>
      // EMERGÊNCIA V24
      if (localStorage.getItem("app_version") !== "v24") {
        localStorage.setItem("app_version", "v24");
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then((regs) => {
            for (let reg of regs) reg.unregister();
          });
        }
        if ("caches" in window) {
          caches.keys().then((names) => {
            for (let name of names) caches.delete(name);
            setTimeout(() => window.location.reload(true), 500);
          });
        }
      }
    </script>
    <style>
      body {
        min-height: 100dvh;
      }
    </style>
  </head>

  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased"
  >
    <div class="app-container glass-effect">
      <!-- Header -->
      <header
        class="sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-3 sm:px-4 pt-4 sm:pt-6 pb-3 sm:pb-4 border-b border-primary/10"
      >
        <div class="flex items-center justify-between mb-2">
          <h1 class="text-lg sm:text-xl font-extrabold tracking-tight">
            Dashboard
          </h1>
          <button
            id="btn-logout"
            class="p-2 -mr-2 rounded-full hover:bg-primary/10 transition-colors text-slate-400 min-h-10 min-w-10 flex items-center justify-center"
          >
            <span class="material-symbols-outlined">logout</span>
          </button>
        </div>
        <p
          class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]"
          id="current-month-header"
        >
          RESUMO MENSAL • MARÇO 2026
        </p>
      </header>

      <main
        class="flex-1 overflow-y-auto px-3 sm:px-4 py-4 sm:py-6 space-y-6 pb-40"
      >
        <!-- Recipe Insights Section -->
        <section
          class="bg-white dark:bg-slate-900 rounded-3xl p-4 sm:p-6 shadow-premium border border-slate-100 dark:border-slate-800 space-y-4"
        >
          <div class="flex items-center gap-2 sm:gap-3">
            <div class="bg-primary/10 p-2 rounded-xl shrink-0">
              <span
                class="material-symbols-outlined text-primary text-lg sm:text-xl"
                >restaurant</span
              >
            </div>
            <h3 class="text-base sm:text-lg font-extrabold tracking-tight">
              As Minhas Receitas
            </h3>
          </div>
          
          <!-- Recipe Count Stats -->
          <div class="grid grid-cols-2 gap-3 sm:gap-4">
            <div
              class="bg-primary/10 dark:bg-primary/10 border border-primary/20 flex flex-col gap-2 rounded-2xl p-4 aspect-square items-center justify-center text-center shadow-premium"
            >
              <span
                class="material-symbols-outlined text-primary text-3xl sm:text-4xl"
                >menu_book</span
              >
              <div>
                <p
                  class="text-primary text-2xl sm:text-3xl font-black leading-none"
                  id="recipe-count"
                >
                  --
                </p>
                <p
                  class="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-slate-500 mt-1"
                >
                  Receitas Totais
                </p>
              </div>
            </div>
            <div
              class="bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex flex-col gap-2 rounded-2xl p-4 aspect-square items-center justify-center text-center shadow-premium"
            >
              <span
                class="material-symbols-outlined text-slate-400 text-3xl sm:text-4xl"
                >bookmark</span
              >
              <div>
                <p
                  class="text-slate-700 dark:text-slate-200 text-2xl sm:text-3xl font-black leading-none"
                  id="saved-recipes-count"
                >
                  --
                </p>
                <p
                  class="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-slate-500 mt-1"
                >
                  Guardadas
                </p>
              </div>
            </div>
          </div>
        </section>

        <!-- Recent Feedback Section -->
        <section
          class="bg-white dark:bg-slate-900 rounded-3xl p-4 sm:p-6 shadow-premium border border-slate-100 dark:border-slate-800 space-y-4"
        >
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 sm:gap-3">
              <div class="bg-primary/10 p-2 rounded-xl shrink-0">
                <span
                  class="material-symbols-outlined text-primary text-lg sm:text-xl"
                  >rate_review</span
                >
              </div>
              <h3 class="text-base sm:text-lg font-extrabold tracking-tight">
                Feedback Recente
              </h3>
            </div>
          </div>
          
          <!-- Feedback List Container -->
          <div id="feedback-list" class="space-y-3">
            <div class="flex flex-col items-center justify-center py-8 text-slate-400 gap-3">
              <div class="size-12 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
                <span class="material-symbols-outlined text-2xl"
                  >sentiment_neutral</span
                >
              </div>
              <p class="font-medium text-sm">Sem feedback ainda</p>
              <p class="text-xs text-slate-500">O teu feedback aparece aqui</p>
            </div>
          </div>
        </section>
      </main>
      <!-- Bottom Navigation Bar will be included dynamically -->
    </div>

    <script type="module">
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
      import { auth } from "./src/firebase-init.js";
      import { getAllRecipes, getUserRecipes, getHousehold, getAllPlans } from "./src/db.js";
      import { logout } from "./src/auth.js";

      document.getElementById("btn-logout").onclick = () => logout();

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          // Load recipe counts
          await loadRecipeStats(user.uid);
          // Load recent feedback
          await loadRecentFeedback(user.uid);
        }
      });

      async function loadRecipeStats(userId) {
        try {
          // Get total recipes count
          const allRecipes = await getAllRecipes(userId);
          const recipeCountEl = document.getElementById("recipe-count");
          if (recipeCountEl) {
            recipeCountEl.textContent = allRecipes.length || 0;
          }

          // Get saved recipes count
          const savedRecipes = await getUserRecipes(userId);
          const savedCountEl = document.getElementById("saved-recipes-count");
          if (savedCountEl) {
            savedCountEl.textContent = savedRecipes.length || 0;
          }
        } catch (error) {
          console.error("Error loading recipe stats:", error);
        }
      }

      async function loadRecentFeedback(userId) {
        try {
          const household = await getHousehold(userId);
          if (!household) return;

          const plans = await getAllPlans(userId);
          const feedbackList = [];
          
          // Gather feedback from all plans
          for (const plan of plans) {
            if (plan.meals) {
              plan.meals.forEach((meal, index) => {
                if (meal.feedback) {
                  feedbackList.push({
                    recipeName: meal.recipeName,
                    feedback: meal.feedback,
                    planId: plan.id,
                    mealIndex: index
                  });
                }
              });
            }
          }

          // Sort by timestamp (most recent first)
          feedbackList.sort((a, b) => {
            const timeA = a.feedback.timestamp ? new Date(a.feedback.timestamp).getTime() : 0;
            const timeB = b.feedback.timestamp ? new Date(b.feedback.timestamp).getTime() : 0;
            return timeB - timeA;
          });

          // Take only the last 5 feedbacks
          const recentFeedback = feedbackList.slice(0, 5);

          const feedbackContainer = document.getElementById("feedback-list");
          if (!feedbackContainer) return;

          if (recentFeedback.length === 0) {
            feedbackContainer.innerHTML = `
              <div class="flex flex-col items-center justify-center py-8 text-slate-400 gap-3">
                <div class="size-12 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
                  <span class="material-symbols-outlined text-2xl">sentiment_neutral</span>
                </div>
                <p class="font-medium text-sm">Sem feedback ainda</p>
                <p class="text-xs text-slate-500">O teu feedback aparece aqui</p>
              </div>
            `;
            return;
          }

          feedbackContainer.innerHTML = recentFeedback.map(item => {
            const kidsIcon = item.feedback.kidsLiked 
              ? '<span class="material-symbols-outlined text-green-500">sentiment_very_satisfied</span>' 
              : '<span class="material-symbols-outlined text-red-400">sentiment_dissatisfied</span>';
            
            const easeIcon = item.feedback.easyToCook === true
              ? '<span class="material-symbols-outlined text-primary">bolt</span>'
              : '<span class="material-symbols-outlined text-amber-500">restaurant</span>';
            
            const wasteIcon = item.feedback.wasteLevel > 0
              ? '<span class="material-symbols-outlined text-orange-400">delete_sweep</span>'
              : '<span class="material-symbols-outlined text-green-500">check_circle</span>';

            return `
              <div class="bg-slate-50 dark:bg-slate-800 rounded-2xl p-4 space-y-3">
                <div class="flex items-center justify-between">
                  <p class="font-bold text-sm truncate flex-1">${item.recipeName}</p>
                </div>
                <div class="flex items-center gap-4 text-xs">
                  <div class="flex items-center gap-1" title="Crianças">
                    ${kidsIcon}
                  </div>
                  <div class="flex items-center gap-1" title="Fácil">
                    ${easeIcon}
                  </div>
                  <div class="flex items-center gap-1" title="Desperdício">
                    ${wasteIcon}
                  </div>
                </div>
              </div>
            `;
          }).join("");
        } catch (error) {
          console.error("Error loading feedback:", error);
        }
      }

      // Version V24
      console.log("Dashboard carregado [V24]");
    </script>
  </body>
  <script>
    // Dynamic include for bottom navigation
    fetch("bottom-nav.html")
      .then((res) => res.text())
      .then((html) => {
        const temp = document.createElement("div");
        temp.innerHTML = html;
        document.body.appendChild(temp.firstElementChild);
        // After nav is loaded, highlight active
        const script = document.createElement("script");
        script.src = "active-screen.js";
        document.body.appendChild(script);
      });
  </script>
</html>
